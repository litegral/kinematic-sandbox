<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <title>Solary - Litegral Labs</title>

    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <!-- Basic SEO -->
    <meta name="description" content="Solary is an interactive space learning experience by Litegral Labs." />

    <!-- Open Graph -->
    <meta property="og:title" content="Solary - Litegral Labs" />
    <meta property="og:description" content="An interactive space learning experience by Litegral Labs." />
    <meta property="og:image" content="https://solary.litegral.com/og.png" />
    <meta property="og:url" content="https://solary.litegral.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Solary - Litegral Labs" />
    <meta name="twitter:description" content="An interactive space learning experience by Litegral Labs." />
    <meta name="twitter:image" content="https://solary.litegral.com/og.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="public/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="public/favicon-16x16.png" />
    <link rel="manifest" href="public/site.webmanifest" />
    <link rel="shortcut icon" href="public/favicon.ico" />

    <link rel="stylesheet" href="./style.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script defer src="https://emilia.litegral.com/script.js"
        data-website-id="bb80d9dd-49ab-4d32-a7da-685e5e5167b2"></script>
</head>

<body>
    <div id="ui-layer">
        <div id="ui-header"> <img id="ui-logo" src="logo.png" alt="Solary Logo" />
            <h1 id="ui-title">Solary</h1>
        </div>
        <div id="stats" style="display:none;"></div>
    </div>
    <div id="level5-hud" class="level5-hud" style="display:none;">
        <div class="level5-hud-card">
            <div class="level5-kicker" id="level5-kicker">Level 5</div>
            <div class="level5-title-row">
                <h2 id="level5-planet">Planet</h2>
                <div class="level5-badge" id="level5-badge">Final Challenge</div>
            </div>
            <p id="level5-question">What kills you first?</p>
            <div class="level5-answers" id="level5-answers"></div>
            <div class="level5-footnote" id="level5-footnote">Answer with ✌️ 👍 🤘 🖖</div>
        </div>
    </div>
    <div id="top-controls"> <span id="bgm-toggle" title="Toggle Music"></span> <span class="divider">|</span> <span
            id="lang-en" class="active">EN</span> <span class="divider">|</span> <span id="lang-id">ID</span> </div>
    <div id="onboarding-layer">
        <h2 id="ob-title">Loading...</h2>
        <div id="ob-content"></div>
        <div id="ob-actions"></div>
    </div>
    <div id="win-layer" class="overlay" style="display:none;"></div>
    <div id="fact-layer" class="overlay" style="display:none;">
        <div class="fact-box">
            <div class="fact-image-wrap">
                <div class="card-reveal-stage">
                    <div class="card-burst"></div> <img id="fact-image" src="" alt="Planet illustration" />
                </div>
            </div>
            <div class="fact-copy">
                <div class="fact-kicker" id="fact-kicker">Fun Fact</div>
                <h3 id="fact-title">Earth</h3>
                <p id="fact-text"></p> <button id="fact-continue" class="ob-btn">Continue</button>
            </div>
        </div>
    </div>
    <!-- <div id="credit"> Powered by <a href="https://litegral.com" target="_blank" rel="noreferrer">Litegral Labs</a> </div> -->
    <video id="webcam-video" autoplay playsinline></video>
    <div id="canvas-container"></div>
    <script type="module" src="./app.js"></script>
</body>

</html>
